title: LAMIR 2026
preposition: ''
description: >-
  Join us for the 2nd Latin American Music Information Retrieval (LAMIR) workshop, from December 15 to 17, 2026, in Belo Horizonte.

baseurl: "/" # the subpath of your site, e.g. /blog
url: "https://lamir-workshop.github.io" # the base hostname & protocol for your site, e.g. https://example.com

# Build settings
markdown: kramdown
sass:
  style: compressed

# Exclude from processing
exclude:
  - .github/
  - venv/
  - README.md
  - LICENSE.md
  - REDISTRIBUTED.md
  - screenshot.png
  - jekyll-theme-conference.gemspec
  - purgecss.config.js
  - _config.example.yml

# Collections and their defaults
collections:
  talks:
    output: true
    permalink: /:collection/:title/
  speakers:
    output: true
    permalink: /:collection/:title/
  rooms:
    output: true
    permalink: /:collection/:title/

defaults:
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
  - scope:
      path: ""
      type: speakers
    values:
      layout: speaker
  - scope:
      path: ""
      type: rooms
    values:
      layout: room

# Theme default values
conference:
  lang: en
  show_errors: True

  talks:
    main_categories:
      - name: Keynote
        color: info
      - name: Industry
        color: info
      - name: Music Program
        color: success

  link_preview:
    disable: false

  speakers:
    show_firstname: true

  location:
    url: '/location'
    map:
      home_coord: -19.870293173937128, -43.964666684656066
      map_provider: "OpenStreetMap.Mapnik"
      default_zoom: 17

  program:
    url: '/program'
    time_steps: 15
    show_alltimes: true

  navigation:
    footer:
      img: 'artista-gaita.png'
    logo:
      name: LAMIR
      img: 'fundos-02.png'
      url: '/'
    links:
      - name: Author Information
        menu:
          - name: Call for Papers
            relative_url: /call4papers/
      - name: Attend
        menu:
        - name: Keynotes and Invited Talks
          relative_url: /talks/
        - name: About Belo Horizonte
          relative_url: /aboutbh/
      - name: About
        menu:
        - name: Organizing Committee
          relative_url: /committee/
        - name: Code of Conduct
          relative_url: /coc/
        - name: Sponsors
          relative_url: /sponsors/
      - name: Proceedings
        relative_url: /proceedings/
      - name: Tutorials
        relative_url: /tutorials/
      - name: Past Editions
        relative_url: /previous/

  info_bars:
    - title: Travel Grants
      color: info
      main_only: true
      text: LAMIR connects and grows the Music Information Retrieval (MIR) and AI community in Latin America. Thanks to our sponsors, travel awards are available to support Latin American student attendees. Check back soon.
    - title: MIR School for Local Students!
      color: info
      main_only: true
      text: Students, join us on December 14th for an additional day featuring an MIR school designed for local students. The main workshop will take place from December 15th to 17th.

  sponsors:
    sponsors:
      - name: ISMIR
        full_name: International Society for Music Information Retrieval
        logo: ismir.png
        url: https://ismir.net
      - name: CNPq
        full_name: Conselho Nacional de Desenvolvimento Científico e Tecnológico
        logo: cnpq.png
        url: https://www.gov.br/cnpq/pt-br
    institutional_support:
      - name: UFMG
        full_name: Universidade Federal de Minas Gerais
        logo: ufmg.png
        url: https://ufmg.br
      - name: UFRJ
        full_name: Universidade Federal do Rio de Janeiro
        logo: ufrj.png
        url: https://ufrj.br
      - name: IEEE SPS
        full_name: IEEE Signal Processing Society
        logo: ieee_sps.png
        url:  https://signalprocessingsociety.org
      - name: JKU
        full_name: Johannes Kepler University Linz
        logo: jku.png
        url: https://www.jku.at
      - name: NYU
        full_name: New York University
        logo: nyu.png
        url: https://www.nyu.edu
      - name: UdelaR
        full_name: Universidad de la República Uruguay
        logo: udelar.png
        url: https://udelar.edu.uy/portal/
      - name: UPF
        full_name: Universitat Pompeu Fabra
        logo: upf.png
        url:  https://www.upf.edu
